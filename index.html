<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>挖宝行动 - 背包地图版</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: linear-gradient(180deg, #0f172a, #111827);
      color: #e5e7eb;
    }

    .container {
      max-width: 1380px;
      margin: 0 auto;
      padding: 20px;
    }

    h1, h2, h3 {
      margin: 0 0 12px;
    }

    .muted {
      color: #94a3b8;
      font-size: 13px;
    }

    .top-bar {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    .main {
      display: grid;
      grid-template-columns: 1.35fr 0.9fr;
      gap: 16px;
    }

    .left-panel, .right-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
      transform: none;
    }

    .btn-primary { background: #3b82f6; color: white; }
    .btn-success { background: #10b981; color: white; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-warning { background: #f59e0b; color: white; }
    .btn-secondary { background: #64748b; color: white; }

    .map-wrapper {
      margin-top: 14px;
    }

    .map-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      grid-template-rows: repeat(8, 54px);
      gap: 6px;
      background: rgba(255,255,255,0.02);
      padding: 10px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      min-height: 500px;
      position: relative;
    }

    .map-cell {
      background: #1f2937;
      border: 1px solid #334155;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #94a3b8;
    }

    .map-item {
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      transition: 0.2s;
      position: relative;
      overflow: hidden;
    }

    .map-item:hover {
      transform: scale(1.01);
      filter: brightness(1.04);
    }

    .map-item.opened {
      cursor: default;
      opacity: 0.45;
      filter: grayscale(0.35);
    }

    .map-item.digging {
      animation: pulseDig 0.8s infinite;
      cursor: wait;
    }

    @keyframes pulseDig {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(0.98); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }

    .inventory-list, .log-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 560px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      border-radius: 12px;
      padding: 10px 12px;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .item-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .item-name {
      font-weight: bold;
      word-break: break-all;
    }

    .item-meta {
      font-size: 12px;
      color: rgba(255,255,255,0.85);
    }

    .log {
      font-size: 13px;
      line-height: 1.5;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
    }

    .highlight {
      color: #fbbf24;
      font-weight: bold;
    }

    .danger-text {
      color: #f87171;
      font-weight: bold;
    }

    .success-text {
      color: #34d399;
      font-weight: bold;
    }

    .rarity-common {
      color: #f3f4f6;
      background: linear-gradient(135deg, #9ca3af, #d1d5db);
    }

    .rarity-uncommon {
      color: #f0fdf4;
      background: linear-gradient(135deg, #15803d, #4ade80);
    }

    .rarity-rare {
      color: #eff6ff;
      background: linear-gradient(135deg, #1d4ed8, #60a5fa);
    }

    .rarity-epic {
      color: #faf5ff;
      background: linear-gradient(135deg, #7c3aed, #c084fc);
    }

    .rarity-legendary {
      color: #fff7ed;
      background: linear-gradient(135deg, #d97706, #fbbf24);
    }

    .rarity-red {
      color: #fff1f2;
      background: linear-gradient(135deg, #b91c1c, #ef4444);
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
      font-size: 13px;
      color: #cbd5e1;
    }

    @media (max-width: 1100px) {
      .main {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .top-bar {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px) {
      .top-bar {
        grid-template-columns: 1fr;
      }

      .map-grid {
        grid-template-columns: repeat(5, 1fr);
        grid-template-rows: repeat(16, 48px);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>挖宝行动 · 背包地图版</h1>
    <p class="muted">地图改为仓库式背包布局。点击物品区域进行挖掘，按稀有度触发不同挖掘时长，物品直接进入右侧背包。</p>

    <div class="top-bar">
      <div class="card">
        <h3>资金</h3>
        <div>￥ <span id="money">5000</span></div>
      </div>
      <div class="card">
        <h3>门票</h3>
        <div><span id="ticket">3</span> 张</div>
      </div>
      <div class="card">
        <h3>地图状态</h3>
        <div id="mapStatus">未进入地图</div>
      </div>
      <div class="card">
        <h3>当前地图总值</h3>
        <div>￥ <span id="raidValue">0</span></div>
      </div>
      <div class="card">
        <h3>已挖价值</h3>
        <div>￥ <span id="collectedValue">0</span></div>
      </div>
    </div>

    <div class="main">
      <div class="left-panel">
        <div class="card">
          <h2>地图：废弃工地仓库</h2>
          <div class="muted">入场消耗 1 张门票。地图中的物品以不同大小随机摆放。越高稀有度，挖掘时间越长。</div>

          <div class="controls">
            <button class="btn-primary" id="enterMapBtn">进入地图</button>
            <button class="btn-success" id="extractBtn" disabled>撤离并保存战利品</button>
            <button class="btn-warning" id="buyTicketBtn">购买门票（￥800）</button>
            <button class="btn-danger" id="resetDataBtn">重置存档</button>
          </div>

          <div class="status-row">
            <div>门票价格参考：<span class="highlight">￥800</span></div>
            <div>说明：一整局可能血赚，也可能小亏</div>
          </div>

          <div class="map-wrapper">
            <div class="map-grid" id="mapGrid"></div>
          </div>
        </div>

        <div class="card">
          <h2>行动日志</h2>
          <div class="log-list" id="logList"></div>
        </div>
      </div>

      <div class="right-panel">
        <div class="card">
          <h2>背包</h2>
          <div class="muted">挖出的物品直接进入背包。可出售，也可按品质整理。</div>
          <div class="controls">
            <button class="btn-secondary" id="sortBagBtn">按品质整理</button>
          </div>
          <div class="inventory-list" id="inventoryList"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "dig_treasure_game_save_v2";
    const TICKET_PRICE = 800;
    const MAP_COLS = 12;
    const MAP_ROWS = 10;

    const rarityConfig = {
      common: {
        label: "普通",
        className: "rarity-common",
        rank: 1,
        digTime: 350
      },
      uncommon: {
        label: "优秀",
        className: "rarity-uncommon",
        rank: 2,
        digTime: 700
      },
      rare: {
        label: "稀有",
        className: "rarity-rare",
        rank: 3,
        digTime: 1100
      },
      epic: {
        label: "史诗",
        className: "rarity-epic",
        rank: 4,
        digTime: 1700
      },
      legendary: {
        label: "传说",
        className: "rarity-legendary",
        rank: 5,
        digTime: 2400
      },
      red: {
        label: "红色珍品",
        className: "rarity-red",
        rank: 6,
        digTime: 3200
      }
    };

    const itemTemplates = [
      { name: "生锈扳手", rarity: "common", size: [1,1], value: 80 },
      { name: "废旧电路板", rarity: "common", size: [1,1], value: 110 },
      { name: "损坏手表", rarity: "common", size: [1,2], value: 140 },

      { name: "军用电池", rarity: "uncommon", size: [1,2], value: 240 },
      { name: "便携工具箱", rarity: "uncommon", size: [2,2], value: 330 },
      { name: "密封药剂盒", rarity: "uncommon", size: [2,1], value: 360 },

      { name: "加密硬盘", rarity: "rare", size: [1,2], value: 620 },
      { name: "战术通讯器", rarity: "rare", size: [2,2], value: 760 },
      { name: "精密瞄具", rarity: "rare", size: [2,1], value: 880 },

      { name: "实验核心模组", rarity: "epic", size: [2,2], value: 1500 },
      { name: "限量纪念金币", rarity: "epic", size: [1,1], value: 1800 },

      { name: "黄金狗牌", rarity: "legendary", size: [2,2], value: 3000 },
      { name: "机密原型芯片", rarity: "legendary", size: [2,3], value: 4200 },

      { name: "绝密数据容器", rarity: "red", size: [3,2], value: 7000 },
      { name: "绝密服务器", rarity: "red", size: [3,3], value: 9000 },
      { name: "红级军工箱", rarity: "red", size: [2,2], value: 8800 }
    ];

    const state = {
      money: 5000,
      tickets: 3,
      inventory: [],
      inRaid: false,
      raidMapItems: [],
      raidGrid: [],
      raidTotalValue: 0,
      collectedValue: 0,
      diggingId: null,
      mapName: "废弃工地仓库"
    };

    const moneyEl = document.getElementById("money");
    const ticketEl = document.getElementById("ticket");
    const mapStatusEl = document.getElementById("mapStatus");
    const raidValueEl = document.getElementById("raidValue");
    const collectedValueEl = document.getElementById("collectedValue");
    const mapGridEl = document.getElementById("mapGrid");
    const inventoryListEl = document.getElementById("inventoryList");
    const logListEl = document.getElementById("logList");

    const enterMapBtn = document.getElementById("enterMapBtn");
    const extractBtn = document.getElementById("extractBtn");
    const buyTicketBtn = document.getElementById("buyTicketBtn");
    const resetDataBtn = document.getElementById("resetDataBtn");
    const sortBagBtn = document.getElementById("sortBagBtn");

    function saveGame() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadGame() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        Object.assign(state, data);
      } catch (e) {
        console.warn("读取存档失败", e);
      }
    }

    function formatMoney(num) {
      return Math.round(num).toLocaleString("zh-CN");
    }

    function addLog(text) {
      const time = new Date().toLocaleTimeString("zh-CN", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
      const div = document.createElement("div");
      div.className = "log";
      div.innerHTML = `[${time}] ${text}`;
      logListEl.prepend(div);

      while (logListEl.children.length > 60) {
        logListEl.removeChild(logListEl.lastChild);
      }
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function randomChoice(arr) {
      return arr[randomInt(0, arr.length - 1)];
    }

    function createRaidTargetValue() {
      const roll = Math.random();

      if (roll < 0.65) {
        return randomInt(750, 1200);
      }
      if (roll < 0.85) {
        return randomInt(400, 850);
      }
      if (roll < 0.96) {
        return randomInt(1400, 3500);
      }
      if (roll < 0.995) {
        return randomInt(3500, 7000);
      }
      return randomInt(7000, 10000);
    }

    function pickTemplateByBudget(remainingValue) {
      const available = itemTemplates.filter(t => t.value <= remainingValue * 1.25);
      if (available.length === 0) {
        return randomChoice(itemTemplates.filter(t => t.rarity === "common"));
      }

      const roll = Math.random();
      let rarityWanted = "common";

      if (roll < 0.42) rarityWanted = "common";
      else if (roll < 0.70) rarityWanted = "uncommon";
      else if (roll < 0.87) rarityWanted = "rare";
      else if (roll < 0.95) rarityWanted = "epic";
      else if (roll < 0.99) rarityWanted = "legendary";
      else rarityWanted = "red";

      const sameRarity = available.filter(t => t.rarity === rarityWanted);
      if (sameRarity.length > 0) return randomChoice(sameRarity);

      return randomChoice(available);
    }

    function canPlace(grid, x, y, w, h) {
      if (x + w > MAP_COLS || y + h > MAP_ROWS) return false;
      for (let yy = y; yy < y + h; yy++) {
        for (let xx = x; xx < x + w; xx++) {
          if (grid[yy][xx] !== null) return false;
        }
      }
      return true;
    }

    function placeItem(grid, itemId, x, y, w, h) {
      for (let yy = y; yy < y + h; yy++) {
        for (let xx = x; xx < x + w; xx++) {
          grid[yy][xx] = itemId;
        }
      }
    }

    function generateRaidMap() {
      const targetValue = createRaidTargetValue();
      const grid = Array.from({ length: MAP_ROWS }, () => Array(MAP_COLS).fill(null));
      const items = [];
      let currentValue = 0;
      let safety = 0;

      while (currentValue < targetValue && safety < 300) {
        safety++;
        const remaining = targetValue - currentValue;
        const tpl = pickTemplateByBudget(remaining);
        const rotated = Math.random() < 0.5;
        const w = rotated ? tpl.size[1] : tpl.size[0];
        const h = rotated ? tpl.size[0] : tpl.size[1];

        let placed = false;
        for (let i = 0; i < 50; i++) {
          const x = randomInt(0, MAP_COLS - 1);
          const y = randomInt(0, MAP_ROWS - 1);

          if (!canPlace(grid, x, y, w, h)) continue;

          const valueFloat = randomInt(90, 115) / 100;
          const item = {
            id: "raid_" + Date.now() + "_" + Math.random().toString(16).slice(2),
            name: tpl.name,
            rarity: tpl.rarity,
            width: w,
            height: h,
            x,
            y,
            value: Math.round(tpl.value * valueFloat),
            opened: false
          };

          items.push(item);
          placeItem(grid, item.id, x, y, w, h);
          currentValue += item.value;
          placed = true;
          break;
        }

        if (!placed) break;
      }

      state.raidGrid = grid;
      state.raidMapItems = items;
      state.raidTotalValue = currentValue;
      state.collectedValue = 0;
    }

    function enterMap() {
      if (state.inRaid) {
        addLog("你已经在地图中了。");
        return;
      }
      if (state.tickets < 1) {
        addLog('<span class="danger-text">门票不足，无法进入地图。</span>');
        return;
      }

      state.tickets -= 1;
      state.inRaid = true;
      state.diggingId = null;
      generateRaidMap();

      addLog(`你消耗了 <span class="highlight">1 张门票</span> 进入 <span class="highlight">${state.mapName}</span>。`);
      addLog(`本次地图预估总价值约 <span class="highlight">￥${formatMoney(state.raidTotalValue)}</span>。祝你好运。`);

      render();
      saveGame();
    }

    function digItem(itemId) {
      if (!state.inRaid) return;
      if (state.diggingId) return;

      const item = state.raidMapItems.find(i => i.id === itemId);
      if (!item || item.opened) return;

      const rarityInfo = rarityConfig[item.rarity];
      state.diggingId = item.id;
      render();

      addLog(`开始挖掘 <span class="${rarityInfo.className}">${item.name}</span>...`);

      setTimeout(() => {
        item.opened = true;
        state.diggingId = null;
        state.inventory.push({
          id: "bag_" + Date.now() + "_" + Math.random().toString(16).slice(2),
          name: item.name,
          rarity: item.rarity,
          value: item.value,
          sizeText: `${item.width}x${item.height}`
        });
        state.collectedValue += item.value;

        addLog(
          `你挖出了 <span class="${rarityInfo.className}">${rarityInfo.label}</span> 物品：` +
          `<span class="${rarityInfo.className}">${item.name}</span>，价值 ￥${formatMoney(item.value)}`
        );

        render();
        saveGame();
      }, rarityInfo.digTime);
    }

    function extractLoot() {
      if (!state.inRaid) return;

      state.inRaid = false;
      state.raidMapItems = [];
      state.raidGrid = [];
      state.raidTotalValue = 0;
      state.collectedValue = 0;
      state.diggingId = null;

      addLog('<span class="success-text">你已成功撤离。</span>');
      render();
      saveGame();
    }

    function sellInventoryItem(id) {
      const idx = state.inventory.findIndex(item => item.id === id);
      if (idx === -1) return;

      const item = state.inventory[idx];
      const rarityInfo = rarityConfig[item.rarity];
      state.money += item.value;
      state.inventory.splice(idx, 1);

      addLog(
        `出售了 <span class="${rarityInfo.className}">${item.name}</span>，获得 ` +
        `<span class="success-text">￥${formatMoney(item.value)}</span>`
      );

      render();
      saveGame();
    }

    function sortBagByRarity() {
      state.inventory.sort((a, b) => {
        const rankDiff = rarityConfig[b.rarity].rank - rarityConfig[a.rarity].rank;
        if (rankDiff !== 0) return rankDiff;
        return b.value - a.value;
      });
      addLog("背包已按品质整理。");
      render();
      saveGame();
    }

    function buyTicket() {
      if (state.money < TICKET_PRICE) {
        addLog('<span class="danger-text">资金不足，无法购买门票。</span>');
        return;
      }
      state.money -= TICKET_PRICE;
      state.tickets += 1;
      addLog(`你花费 ￥${formatMoney(TICKET_PRICE)} 购买了 1 张门票。`);
      render();
      saveGame();
    }

    function resetData() {
      const ok = confirm("确定要重置存档吗？");
      if (!ok) return;

      localStorage.removeItem(STORAGE_KEY);
      state.money = 5000;
      state.tickets = 3;
      state.inventory = [];
      state.inRaid = false;
      state.raidMapItems = [];
      state.raidGrid = [];
      state.raidTotalValue = 0;
      state.collectedValue = 0;
      state.diggingId = null;
      state.mapName = "废弃工地仓库";

      addLog("存档已重置。");
      render();
      saveGame();
    }

    function renderTopBar() {
      moneyEl.textContent = formatMoney(state.money);
      ticketEl.textContent = state.tickets;
      mapStatusEl.innerHTML = state.inRaid
        ? '<span class="success-text">探索中</span>'
        : '未进入地图';

      raidValueEl.textContent = formatMoney(state.raidTotalValue);
      collectedValueEl.textContent = formatMoney(state.collectedValue);

      enterMapBtn.disabled = state.inRaid;
      extractBtn.disabled = !state.inRaid || !!state.diggingId;
    }

    function renderMap() {
      mapGridEl.innerHTML = "";

      if (!state.inRaid) {
        for (let y = 0; y < MAP_ROWS; y++) {
          for (let x = 0; x < MAP_COLS; x++) {
            const cell = document.createElement("div");
            cell.className = "map-cell";
            cell.textContent = "未进入";
            mapGridEl.appendChild(cell);
          }
        }
        return;
      }

      for (let y = 0; y < MAP_ROWS; y++) {
        for (let x = 0; x < MAP_COLS; x++) {
          const cell = document.createElement("div");
          cell.className = "map-cell";
          mapGridEl.appendChild(cell);
        }
      }

      state.raidMapItems.forEach(item => {
        const rarityInfo = rarityConfig[item.rarity];
        const div = document.createElement("div");
        div.className = `map-item ${rarityInfo.className}`;
        if (item.opened) div.classList.add("opened");
        if (state.diggingId === item.id) div.classList.add("digging");

        div.style.gridColumn = `${item.x + 1} / span ${item.width}`;
        div.style.gridRow = `${item.y + 1} / span ${item.height}`;

        div.innerHTML = item.opened
          ? `${item.name}<br><span style="font-size:11px;">已获取</span>`
          : `${item.width}x${item.height}<br>${rarityInfo.label}`;

        div.addEventListener("click", () => digItem(item.id));
        mapGridEl.appendChild(div);
      });
    }

    function renderInventory() {
      inventoryListEl.innerHTML = "";

      if (state.inventory.length === 0) {
        const div = document.createElement("div");
        div.className = "muted";
        div.textContent = "背包空空如也，快去挖宝吧。";
        inventoryListEl.appendChild(div);
        return;
      }

      state.inventory.forEach(item => {
        const rarityInfo = rarityConfig[item.rarity];

        const wrap = document.createElement("div");
        wrap.className = `item ${rarityInfo.className}`;

        const left = document.createElement("div");
        left.className = "item-left";
        left.innerHTML = `
          <div class="item-name">${item.name}</div>
          <div class="item-meta">${rarityInfo.label} · 占格 ${item.sizeText} · ￥${formatMoney(item.value)}</div>
        `;

        const btn = document.createElement("button");
        btn.className = "btn-success";
        btn.textContent = "出售";
        btn.addEventListener("click", () => sellInventoryItem(item.id));

        wrap.appendChild(left);
        wrap.appendChild(btn);
        inventoryListEl.appendChild(wrap);
      });
    }

    function render() {
      renderTopBar();
      renderMap();
      renderInventory();
    }

    enterMapBtn.addEventListener("click", enterMap);
    extractBtn.addEventListener("click", extractLoot);
    buyTicketBtn.addEventListener("click", buyTicket);
    resetDataBtn.addEventListener("click", resetData);
    sortBagBtn.addEventListener("click", sortBagByRarity);

    loadGame();
    render();
    addLog("欢迎来到挖宝行动背包地图版。");
  </script>
</body>
</html>
